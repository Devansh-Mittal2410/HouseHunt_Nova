services:
  - type: web
    name: househunt-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    disks:
      - name: househunt-uploads
        mountPath: /opt/render/project/src/server/uploads
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /opt/render/project/src/server/uploads

  - type: static
    name: househunt-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
